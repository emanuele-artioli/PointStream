name: pointstream-ci

on:
  push:
    branches:
      - main
      - master
      - march26version
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install coverage==7.8.0
          pip install torch==2.5.1 --index-url https://download.pytorch.org/whl/cpu

      - name: Run ruff lint
        run: |
          ruff check src tests scripts

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install coverage==7.8.0
          pip install torch==2.5.1 --index-url https://download.pytorch.org/whl/cpu

      - name: Run mypy
        run: |
          mypy --config-file pyproject.toml

  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install coverage==7.8.0
          pip install torch==2.5.1 --index-url https://download.pytorch.org/whl/cpu

      - name: Install FFmpeg tools
        run: |
          if ! command -v ffmpeg >/dev/null 2>&1 || ! command -v ffprobe >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ffmpeg
          fi

      - name: Run tests with coverage gate
        run: |
          python scripts/check_coverage_gate.py

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
