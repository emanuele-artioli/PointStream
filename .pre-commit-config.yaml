repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.2
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        additional_dependencies: ["pydantic==2.11.2", "numpy==1.26.4", "msgpack==1.1.0"]
        args: ["--config-file=pyproject.toml"]

  - repo: local
    hooks:
      - id: sync-agent-rules
        name: agent rule files match CLAUDE.md
        entry: python3 tools/sync_agent_rules.py --check
        language: system
        pass_filenames: false
        files: ^(CLAUDE\.md|AGENTS\.md|\.agents/rules/|\.github/instructions/|tools/sync_agent_rules\.py)
