# PointStream Baseline Configuration (Residual-Only)
# Uses the whole-frame residual baseline without GenAI synthesis.
# This provides ground-truth for ablation studies - always reconstructs perfectly.

source_uri: null                      # Override with your input video path
num-frames: null                      # Process full video
summary-file: true
ffmpeg-codec: libsvtav1
log-level: info
dry-run: false
transport: disk

# Execution settings
execution-pool: inline
# cpu-workers: null
# gpu-workers: null

# Real actor extraction pipeline
actor-extractor: real
detector: yolo26
detector-caption: tennis player
pose-estimator: yolo
segmenter: yolo
segmenter-caption: tennis player
payload-pose-delta-threshold: 20.0

# Ball extraction
ball-extractor: difference            # Use difference-based detection
ball-difference-threshold: 18.0
ball-min-blob-area: 6

# Reference crops
reference-jpeg-quality: 75
reference-padding-ratio: 0.10

# Importance mapping
importance-mapper: binary
# No GenAI - just whole-frame residuals
residual-mode: full_video             # Transmit full video residuals as ground truth
residual-background-downscale: 2      # Still apply background downscaling for bitrate comparison
seed: 1337

# GPU settings
# gpu-dtype: null
# panorama-warp-batch-size: null

# CRITICAL: Disable GenAI completely
genai-backend: null                   # No synthesis - pure residuals

# Evaluation
debug: false
evaluation-mode: psnr                 # Measure reconstruction quality
skip-eval: false
