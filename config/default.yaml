# PointStream Default Configuration
# This is the default configuration with sensible values for all CLI arguments.
# Use this as a template for creating custom configs for ablation tests and performance optimization.

# ============================================================================
# Core Input/Output Settings
# ============================================================================
# source-uri: null                    # Path to input video (optional; mock source used if omitted)
num-frames: null                      # Maximum number of frames to process (null = all frames)
summary-file: true                    # Write run_summary.json
ffmpeg-codec: libsvtav1               # FFmpeg encoder: libsvtav1, libx265, etc.
codec-crf: 35                         # FFmpeg CRF quality (lower = better). null uses codec defaults
codec-preset: slow                    # FFmpeg preset/speed (e.g., veryfast, medium, slow). null uses codec defaults
log-level: debug                      # Log verbosity: debug, info, warning, error
transport: disk                       # Transport backend: currently only 'disk'

# ============================================================================
# Execution Pool Configuration
# ============================================================================
execution-pool: inline                # DAG execution mode: inline or tagged
cpu-workers: null                     # CPU worker count (null = auto-detect)
gpu-workers: null                     # GPU worker count (null = auto-detect)

# ============================================================================
# Actor Extraction Pipeline
# ============================================================================
detector: yolo26n.pt                  # Player detector model filename: mock, yolo26n.pt or yoloe26n.pt (open-vocabulary)
target-class-caption: tennis player   # Caption for open-vocabulary detectors and segmenters
pose-estimator: yolo26n-pose.pt       # Pose estimator model filename: mock, yolo26n-pose.pt or dw-pose
segmenter: yolo26n-seg.pt             # Segmentation model filename: mock, yolo26n-seg.pt or yoloe26n-seg.pt (open-vocabulary)
payload-pose-delta-threshold: 20.0    # Pose keyframe delta threshold

# ============================================================================
# Ball Extraction Configuration
# ============================================================================
ball-extractor: difference            # Ball extraction: difference, segmentation, cascade, mock
ball-difference-threshold: 18.0       # Pixel-difference threshold for difference-based extraction
ball-min-blob-area: 6                 # Minimum connected-component area for ball detection
ball-max-side: 0                      # Max frame side for ball extraction (0 = native resolution)
ball-det-conf: null                   # Detection confidence threshold for segmentation-based detector
ball-det-model: null                  # Model filename/path for segmentation-based detector
ball-class-id: null                   # Class ID for segmentation-based detector

# ============================================================================
# Reference Crop Configuration
# ============================================================================
reference-jpeg-quality: 95            # JPEG quality for actor reference crops
reference-padding-ratio: 0.10         # Padding ratio for reference crop extraction

# ============================================================================
# Residual and Importance Mapping
# ============================================================================
importance-mapper: uniform            # Residual weighting strategy: binary or uniform
residual-background-downscale: 2      # Downscale factor for background residuals (use None to disable)
residual-batch-size: 8                # Number of frames processed per GPU batch
downscale-interpolation: bilinear     # Background downscale interpolation: nearest, bilinear, bicubic, area
residual-block-size: 8                # Block size used for pooled residual activity gating
residual-block-threshold: 0.0         # Average absolute error threshold per block in pixel units
seed: 1337                            # Deterministic seed for synthesis and GenAI

# ============================================================================
# GPU and Performance Tuning
# ============================================================================
gpu-dtype: fp16                       # GPU compute dtype: fp16, fp32, bf16, fp8_e4m3fn, fp8_e5m2
panorama-warp-batch-size: null        # Batch size for panorama warp operations
panorama-codec: jpeg                  # Panorama codec: jpeg or png
panorama-jpeg-quality: 50             # JPEG quality when --panorama-codec=jpeg
panorama-png-compression: null        # PNG compression level when --panorama-codec=png

# ============================================================================
# Model and Dependencies
# ============================================================================
allow-auto-model-download: true       # Allow automatic model downloads


# ============================================================================
# Evaluation Settings
# ============================================================================
evaluation-mode: [psnr, ssim, vmaf]   # Post-run evaluation metrics: none, [psnr], [psnr, ssim, vmaf]
evaluation-max-frames: null           # Optional frame cap for quality evaluation

# ============================================================================
# GenAI and AnimateAnyone Configuration
# ============================================================================                
genai-backend: controlnet             # GenAI backend: controlnet, animate-anyone (null disables GenAI)
animate-anyone-repo-dir: null             # Path to Moore-AnimateAnyone repository
animate-anyone-model-dir: null            # Override if models are in non-standard location
animate-anyone-steps: 3                  # Diffusion inference steps for AnimateAnyone
animate-anyone-cfg: 7.5                   # Guidance (CFG) scale for AnimateAnyone
animate-anyone-width: 256                 # Width for AnimateAnyone model (pixels)
animate-anyone-height: 256                # Height for AnimateAnyone model (pixels)
animate-anyone-window: null               # Temporal conditioning window length
genai-preroll-frames: 0                   # Frames to keep residual-only before temporal GenAI starts
genai-keyframe-only: false                # Run GenAI only on received keyframe skeletons and interpolate outputs locally
animate-anyone-transparent-threshold: 64  # Black-background alpha threshold
genai-resize-mode: aspect-recovery        # Resize mode: plain or aspect-recovery
animate-anyone-adaptive-threshold: true   # Enable adaptive border-threshold masking
animate-anyone-alpha-smoothing: 0.5       # Temporal smoothing factor [0, 1]
controlnet-width: 512                     # Width for ControlNet generated frame (pixels)
controlnet-height: 512                    # Height for ControlNet generated frame (pixels)
controlnet-steps: 20                      # Diffusion inference steps for ControlNet
controlnet-strength: 0.65                 # Img2Img strength for ControlNet
controlnet-cfg: 7.0                       # Guidance scale for ControlNet


# ============================================================================
# Compositing and Masking
# ============================================================================
compositing-mask-mode: postgen-seg-client # Actor compositing: alpha-heuristic, metadata-source-mask, postgen-seg-client, pose-heuristic-mask
postgen-segmenter-backend: yolo           # Segmenter backend: yolo, heuristic
postgen-segmenter-model: null         # Explicit model file for postgen segmenter
metadata-mask-codec: auto                 # Mask codec: auto, rle-v1, bitpack-z1, png, segmenter-native, yolo-native
pose-heuristic-mask-dilation: 0.15        # Fraction of bounding box size to use for mask boundary dilation

# ============================================================================
# Optimizations and Execution
# ============================================================================
enable-shifted-ball: false                # Stream actor frame states one frame early for ball extraction